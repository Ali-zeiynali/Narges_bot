<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}پنل نرگس{% endblock %}</title>
  <style>
    :root{--bg:#f3f6fb;--panel:#fff;--text:#172033;--muted:#697386;--line:#e2e8f0;--brand:#2563eb;--brand2:#7c3aed;--bad:#dc2626;--ok:#16a34a;--warn:#d97706;--shadow:0 10px 30px rgba(15,23,42,.07)}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f8fbff,#eef2ff);color:var(--text);font-family:Tahoma,Arial,sans-serif;font-size:14px;line-height:1.7}
    a{color:var(--brand);text-decoration:none}.shell{display:grid;grid-template-columns:250px minmax(0,1fr);min-height:100vh}
    aside{background:#0f172a;color:#e5e7eb;padding:22px 16px;position:sticky;top:0;height:100vh;box-shadow:var(--shadow)}
    aside h1{font-size:21px;margin:0 0 22px}.nav a{display:flex;align-items:center;gap:8px;color:#d1d5db;padding:10px 12px;border-radius:10px;margin:5px 0;transition:.15s}.nav a:hover{background:#1e293b;color:#fff;transform:translateX(-2px)}
    main{padding:24px;max-width:1600px;width:100%;overflow:hidden}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
    h2{font-size:25px;margin:0 0 6px}h3{margin:0 0 12px;font-size:17px}.muted{color:var(--muted)}.flash{background:#ecfeff;border:1px solid #67e8f9;color:#155e75;padding:10px 12px;border-radius:10px;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}.metric b{font-size:28px;display:block;margin-top:6px;direction:ltr}
    .table-wrap{width:100%;overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel)}table{width:100%;border-collapse:collapse;min-width:780px}th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:right;vertical-align:top}th{background:#f8fafc;color:#334155;font-weight:700}tr:hover td{background:#f9fbff}.ltr{direction:ltr;text-align:left}
    input,textarea,select{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text)}textarea{min-height:110px;resize:vertical}
    button,.btn{display:inline-block;border:0;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:9px 14px;border-radius:10px;cursor:pointer;box-shadow:0 7px 18px rgba(37,99,235,.18)}.btn.secondary,button.secondary{background:#475569}.btn.bad,button.bad{background:var(--bad);box-shadow:none}
    .row{display:flex;gap:10px;align-items:center}.row>*{flex:1}.pill{display:inline-block;padding:3px 9px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px}.ok{color:var(--ok)}.bad{color:var(--bad)}.warn{color:var(--warn)}
    pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e5e7eb;padding:12px;border-radius:10px;direction:ltr;text-align:left;max-height:360px;overflow:auto}
    @media(max-width:950px){.shell{grid-template-columns:1fr}aside{position:relative;height:auto}.grid,.grid.two,.grid.three{grid-template-columns:1fr}main{padding:14px}.row{display:block}.row>*{margin-bottom:8px}table{min-width:680px}}
  </style>
</head>
<body>
<div class="shell">
  <aside>
    <h1>پنل نرگس</h1>
    <nav class="nav">
      <a href="/admin">داشبورد</a>
      <a href="/admin/users">کاربران</a>
      <a href="/admin/messages">پیام‌ها</a>
      <a href="/admin/memories">حافظه</a>
      <a href="/admin/model">مدل و AI</a>
      <a href="/admin/providers">Providerها</a>
      <a href="/admin/invoices">Invoiceها</a>
      <a href="/admin/channels">کانال‌های اجباری</a>
      <a href="/admin/broadcast">ارسال همگانی</a>
      <a href="/admin/logs">لاگ‌ها</a>
      <a href="/admin/logout">خروج</a>
    </nav>
  </aside>
  <main>
    {% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
