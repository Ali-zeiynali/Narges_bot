services:
  - type: web
    name: narges-telegram-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    healthCheckPath: /health
    disk:
      name: narges-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: ADMIN_PANEL_TOKEN
        generateValue: true
      - key: WEBHOOK_WORKER_COUNT
        value: "1"
      - key: WEBHOOK_QUEUE_MAXSIZE
        value: "200"
      - key: TELEGRAM_PROXY
        value: ""
      - key: DATABASE_PATH
        value: /var/data/narges.sqlite3
      - key: LOG_FILE
        value: /var/data/logs/bot.log
      - key: AI_PROVIDERS_CONFIG
        value: /var/data/config/ai_providers.json
      - key: LOG_LEVEL
        value: INFO
